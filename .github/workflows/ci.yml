# CI: unit tests and golangci-lint for all Go modules in this repo.
name: CI

on:
  push:
    branches: [main, master, "feat/*"]
  pull_request:
    branches: [main, master, "feat/*"]

permissions:
  contents: read

jobs:
  test-and-lint:
    name: Go (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - otel-mongo
          - otel-mongo/v2
          - otel-nats
          - otel-gorilla-ws
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false

      - name: Build
        run: go build ./...
        working-directory: ${{ matrix.module }}

      - name: Test
        run: go test -v -race ./...
        working-directory: ${{ matrix.module }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          working-directory: ${{ matrix.module }}
