# Go unit tests and golangci-lint for this repo (instrumentation-go).
# When used as a submodule, the parent repo runs CI with submodules: recursive.
name: Go

on:
  push:
    branches: [main, master, "feat/*"]
  pull_request:
    branches: [main, master, "feat/*"]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Build, test & lint
        run: |
          set -e
          modules=(otel-mongo otel-mongo/v2 otel-websocket)
          for mod in "${modules[@]}"; do
            echo ">>> $mod"
            (cd "$mod" && go build ./... && go test ./... && golangci-lint run ./...)
          done
